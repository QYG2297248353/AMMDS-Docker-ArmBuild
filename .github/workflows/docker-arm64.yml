name: Build & Publish ARM64 Images

on:
  push:
    branches: [ master ]
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      ref_name:
        description: "镜像标签（如 v1.6.10）"
        required: true
        default: "v1.0.0"

env:
  REPO_DOCKERHUB: docker.io/qyg2297248353/ammds
  REPO_GHCR: ghcr.io/qyg2297248353/ammds


jobs:

  # =====================================================
  # 1. 统一计算 tag
  # =====================================================
  set-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.calc.outputs.tag }}
    steps:
      - id: calc
        run: |
          RAW=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ github.event.inputs.ref_name }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            RAW="${{ github.event.release.tag_name }}"
          else
            RAW=${GITHUB_REF#refs/heads/}
          fi
          CLEAN=$(echo "$RAW" | sed 's#refs/tags/##g')
          echo "tag=$CLEAN" >> $GITHUB_OUTPUT


  # =====================================================
  # 2. 检查是否已存在（ARM 两个版本）
  # =====================================================
  check-images:
    needs: set-tag
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check images
        id: check
        run: |
          TAG="${{ needs.set-tag.outputs.tag }}"

          ARM="${{ env.REPO_DOCKERHUB }}:${TAG}-arm64"
          OL8="${{ env.REPO_DOCKERHUB }}:${TAG}-arm64-ol8"

          echo "Checking $ARM"
          echo "Checking $OL8"

          if docker buildx imagetools inspect "$ARM" >/dev/null 2>&1 && \
             docker buildx imagetools inspect "$OL8" >/dev/null 2>&1; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi


  # =====================================================
  # 3a. ARM64 构建（标准版）
  # =====================================================
  build-arm64:
    needs: [set-tag, check-images]
    if: needs.check-images.outputs.skip == 'false'
    runs-on: ubuntu-22.04-arm

    steps:
      - name: Clone external repo
        run: |
          git lfs install --skip-smudge
          git clone https://x-access-token:${{ secrets.GITHUBTOKEN }}@github.com/QYG2297248353/AMMDS.git source
          cd source
          git checkout master
          git lfs pull

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUBTOKEN }}

      - name: Build & Push ARM64
        uses: docker/build-push-action@v6
        with:
          context: ./source
          file: ./source/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REPO_DOCKERHUB }}:${{ needs.set-tag.outputs.tag }}-arm64
            ${{ env.REPO_GHCR }}:${{ needs.set-tag.outputs.tag }}-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # =====================================================
  # 3b. ARM64 OL8 构建
  # =====================================================
  build-arm64-ol8:
    needs: [set-tag, check-images]
    if: needs.check-images.outputs.skip == 'false'
    runs-on: ubuntu-22.04-arm

    steps:
      - name: Clone external repo
        run: |
          git lfs install --skip-smudge
          git clone https://x-access-token:${{ secrets.GITHUBTOKEN }}@github.com/QYG2297248353/AMMDS.git source
          cd source
          git checkout master
          git lfs pull

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUBTOKEN }}

      - name: Build & Push ARM64 OL8
        uses: docker/build-push-action@v6
        with:
          context: ./source
          file: ./source/Dockerfile-ol8
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REPO_DOCKERHUB }}:${{ needs.set-tag.outputs.tag }}-arm64-ol8
            ${{ env.REPO_GHCR }}:${{ needs.set-tag.outputs.tag }}-arm64-ol8
          cache-from: type=gha
          cache-to: type=gha,mode=max
